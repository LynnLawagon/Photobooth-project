<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="flash-overlay" aria-hidden="true"></div>

    <div class="container">
        <header class="app-header">
            <h1>📸 Photobooth</h1>
            <button id="fullscreen-btn" class="icon-btn" title="Toggle fullscreen">⛶</button>
        </header>

        <div class="camera-section">
            <div class="video-wrapper">
                <video id="video" autoplay muted playsinline></video>
                <div id="countdown-overlay" class="countdown-overlay hidden" aria-live="polite">
                    <span id="countdown-number"></span>
                </div>
                <div id="sticker-layer" class="sticker-layer"></div>
            </div>

            <div class="camera-options">
                <label class="option-label">
                    Camera
                    <select id="camera-select">
                        <option value="">Loading cameras...</option>
                    </select>
                </label>
                <label class="option-label">
                    Filter
                    <select id="filter-select">
                        <option value="none">No Filter</option>
                        <option value="grayscale">Black &amp; White</option>
                        <option value="sepia">Sepia</option>
                        <option value="noir">Noir</option>
                        <option value="vintage">Vintage</option>
                        <option value="vivid">Vivid</option>
                        <option value="cool">Cool Tone</option>
                        <option value="warm">Warm Tone</option>
                        <option value="dreamy">Dreamy</option>
                    </select>
                </label>
            </div>

            <div class="stickers-section">
                <div class="section-header">
                    <p class="strip-layout-label">Stickers</p>
                    <button id="clear-stickers-btn" class="btn btn-small">Clear Stickers</button>
                </div>
                <div id="sticker-palette" class="sticker-palette">
                    <button type="button" class="sticker-option" data-emoji="😎">😎</button>
                    <button type="button" class="sticker-option" data-emoji="❤️">❤️</button>
                    <button type="button" class="sticker-option" data-emoji="🎉">🎉</button>
                    <button type="button" class="sticker-option" data-emoji="⭐">⭐</button>
                    <button type="button" class="sticker-option" data-emoji="👑">👑</button>
                    <button type="button" class="sticker-option" data-emoji="🎀">🎀</button>
                    <button type="button" class="sticker-option" data-emoji="🔥">🔥</button>
                    <button type="button" class="sticker-option" data-emoji="💕">💕</button>
                    <button type="button" class="sticker-option" data-emoji="🌸">🌸</button>
                    <button type="button" class="sticker-option" data-emoji="✨">✨</button>
                </div>
            </div>

            <div class="strip-layout-section">
                <p class="strip-layout-label">Photo Strip Layout</p>
                <div id="strip-layout-picker" class="strip-layout-picker">
                    <button type="button" class="strip-option active" data-layout="vertical-4" title="4 photos stacked vertically">
                        <span class="strip-preview strip-preview-vertical-4"></span>
                        <span>Vertical 4</span>
                    </button>
                    <button type="button" class="strip-option" data-layout="horizontal-4" title="4 photos in a row">
                        <span class="strip-preview strip-preview-horizontal-4"></span>
                        <span>Horizontal 4</span>
                    </button>
                    <button type="button" class="strip-option" data-layout="grid-2x2" title="4 photos in a 2×2 grid">
                        <span class="strip-preview strip-preview-grid-2x2"></span>
                        <span>2×2 Grid</span>
                    </button>
                    <button type="button" class="strip-option" data-layout="vertical-3" title="3 photos stacked vertically">
                        <span class="strip-preview strip-preview-vertical-3"></span>
                        <span>Vertical 3</span>
                    </button>
                    <button type="button" class="strip-option" data-layout="horizontal-3" title="3 photos in a row">
                        <span class="strip-preview strip-preview-horizontal-3"></span>
                        <span>Horizontal 3</span>
                    </button>
                </div>
            </div>

            <div class="controls">
                <label class="timer-label">
                    Timer (sec)
                    <input type="number" id="timer" min="0" max="60" value="3" placeholder="0">
                </label>
                <button id="capture-btn" class="btn btn-primary">⭐ Capture</button>
                <button id="strip-btn" class="btn btn-secondary">🎞️ Start Strip</button>
            </div>
        </div>

        <div class="gallery-section">
            <div class="section-header">
                <h3>Session Gallery</h3>
                <button id="select-all-btn" class="btn btn-small">Select All</button>
            </div>
            <p id="session-empty" class="empty-message">No photos yet — capture one to get started!</p>
            <div id="gallery"></div>
            <button id="batch-save-btn" class="batch-save-btn hidden">💾 Download Selected Images</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
