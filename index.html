<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📸 Photobooth</h1>
        
        <div class="camera-section">
            <video id="video" autoplay muted playsinline></video>
            
            <div class="controls">
                <input type="number" id="timer" placeholder="-" min="0" max="10" value="0">
                <button id="capture-btn">⭐ Capture</button>
                <!-- Select All button will be added by JS -->
            </div>
        </div>
        
        <div class="gallery-section">
            <h3>Gallery</h3>
            <div id="gallery"></div>
            <!-- Batch save button will be added by JS -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
